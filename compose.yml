services:
  mylists:
    image: mylists-app
    container_name: mylists
    build:
      context: ./src
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data/db:/app/instance
      - ./data/images:/app/storage/images
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.mylists-maintenance.schedule: "0 0 3 * * *"
      ofelia.job-exec.mylists-maintenance.command: "bun /app/dist/cli/index.js maintenance"
    restart: unless-stopped
    networks:
      - default
      - web_net

  redis:
    image: redis:7-alpine
    container_name: mylists-redis
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    networks:
      - default
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:

networks:
  web_net:
    external: true
