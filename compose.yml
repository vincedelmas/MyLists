services:
  app:
    image: mylists-app
    build:
      context: .
      args:
        VITE_BASE_URL: ${VITE_BASE_URL:-http://localhost:3000}
        VITE_CONTACT_MAIL: ${VITE_CONTACT_MAIL:-}
        VITE_PUBLIC_POSTHOG_KEY: ${VITE_PUBLIC_POSTHOG_KEY:-}
        VITE_PUBLIC_POSTHOG_HOST: ${VITE_PUBLIC_POSTHOG_HOST:-}
        VITE_PUBLIC_POSTHOG_UI_HOST: ${VITE_PUBLIC_POSTHOG_UI_HOST:-}
    env_file:
      - .env.docker
    environment:
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - mylists-db:/app/instance
      - mylists-uploads:/app/storage/images
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - mylists-redis:/data
    restart: unless-stopped

volumes:
  mylists-db:
    name: mylists-db
  mylists-uploads:
    name: mylists-uploads
  mylists-redis:
    name: mylists-redis
